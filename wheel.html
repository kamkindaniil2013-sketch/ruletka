<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Колесо фортуны</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background-color: #1a1a1a;
            color: white;
            padding: 50px 20px;
            user-select: none;
        }

        .main-layout {
            display: flex;
            align-items: center;
            gap: 60px;
            background: #2a2a2a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .left-side {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            color: #ffcc00; 
            margin-top: 0;
            margin-bottom: 20px;
        }
        
        .wheel-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 20px 0;
        }
        
        /* Красная стрелка сверху */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 35px solid red;
            z-index: 10;
        }
        
        /* Колесо */
        .wheel {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid white;
            box-sizing: border-box;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.25, 1, 0.5, 1); 
        }

        /* Динамический холст для секторов */
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        button {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            background-color: #ffcc00;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: 0.2s;
            margin-top: 15px;
            color: black;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        button:hover { background-color: #ffe066; }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; }

        #result {
            margin-top: 25px;
            font-size: 28px;
            font-weight: bold;
            height: 35px;
            text-align: center;
        }

        /* Правая панель настроек */
        .right-side {
            display: flex;
            flex-direction: column;
            width: 250px;
        }

        .right-side label {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #ffcc00;
        }

        textarea {
            width: 100%;
            height: 280px;
            background-color: #1a1a1a;
            color: white;
            border: 2px solid #444;
            border-radius: 6px;
            padding: 10px;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            font-family: sans-serif;
            line-height: 1.4;
        }
        textarea:focus {
            border-color: #ffcc00;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="main-layout">
        
        <div class="left-side">
            <h1>Колесо фортуны</h1>
            <div class="wheel-container">
                <div class="pointer"></div>
                <div class="wheel" id="wheel">
                    <canvas id="wheelCanvas" width="600" height="600"></canvas>
                </div>
            </div>
            <button id="spin-btn">Крутить!</button>
            <div id="result"></div>
        </div>

        <div class="right-side">
            <label for="options-input">Варианты (каждый с новой строки):</label>
            <textarea id="options-input">МНЕ
ВАМ
ПРИЗ
СКИДКА
УДАЧА</textarea>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spin-btn');
        const resultText = document.getElementById('result');
        const optionsInput = document.getElementById('options-input');

        let sectors = [];
        let isSpinning = false;
        let currentRotation = 0;

        // Яркая палитра цветов для секторов
        const colors = [
            '#ffcc00', '#444444', '#3498db', '#e74c3c', 
            '#2ecc71', '#9b59b6', '#1abc9c', '#e67e22'
        ];

        // Функция отрисовки секторов на Canvas
        function drawWheel() {
            const lines = optionsInput.value.split('\n').map(line => line.trim()).filter(line => line !== "");
            sectors = lines.length > 0 ? lines : ["Пусто"];
            
            const numSectors = sectors.length;
            const arc = (2 * Math.PI) / numSectors;
            const radius = canvas.width / 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            sectors.forEach((text, i) => {
                const angle = i * arc;
                
                // Рисуем цветной сектор
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, angle, angle + arc);
                ctx.lineTo(radius, radius);
                ctx.fill();

                // Добавляем текст
                ctx.save();
                ctx.translate(radius, radius);
                // Поворачиваем холст на середину текущего сектора
                ctx.rotate(angle + arc / 2);
                
                // Настройка шрифта и цвета букв в зависимости от фона
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.fillStyle = (colors[i % colors.length] === '#ffcc00') ? 'black' : 'white';
                ctx.font = "bold 30px sans-serif";
                
                // Пишем текст вдоль радиуса (крутится красиво вместе с колесом)
                ctx.fillText(text.toUpperCase(), radius - 40, 0);
                ctx.restore();
            });
        }

        // Обновляем колесо при вводе текста в меню справа
        optionsInput.addEventListener('input', drawWheel);
        drawWheel(); // Начальная отрисовка при старте страницы

        function startSpin(isSecretMode) {
            if (isSpinning) return;
            isSpinning = true;
            spinBtn.disabled = true;
            resultText.innerText = "Колесо запущено...";

            let targetIndex = 0;

            if (isSecretMode) {
                // СЕКРЕТНЫЙ РЕЖИМ (Правый клик): 80% на первый элемент, 20% на остальные
                let roll = Math.random() * 100;
                if (roll <= 80) {
                    targetIndex = 0; // Всегда выпадает самый первый вариант из списка (например, МНЕ)
                } else {
                    targetIndex = Math.floor(Math.random() * (sectors.length - 1)) + 1;
                }
            } else {
                // ЧЕСТНЫЙ РЕЖИМ (Левый клик): Абсолютно равные шансы для всех
                targetIndex = Math.floor(Math.random() * sectors.length);
            }

            const numSectors = sectors.length;
            const arcDegrees = 360 / numSectors;

            // Расчет угла для остановки строго под верхней стрелкой (стрелка на 270 градусах в координатах Canvas)
            let targetAngle = 270 - (targetIndex * arcDegrees + arcDegrees / 2);
            
            // Нормализуем угол, чтобы избежать отрицательных значений
            if (targetAngle < 0) targetAngle += 360;

            let turns = 5 * 360; // 5 полных быстрых оборотов
            let tinyOffset = (Math.random() * (arcDegrees * 0.7)) - (arcDegrees * 0.35); // Смещение, чтобы стрелка не указывала строго в центр

            // Считаем итоговое вращение
            currentRotation += turns + (targetAngle - (currentRotation % 360)) + tinyOffset;

            // Крутим колесо
            wheel.style.transform = "rotate(" + currentRotation + "deg)";

            // Конец анимации через 4 секунды
            setTimeout(() => {
                resultText.innerText = "Выпало: " + sectors[targetIndex].toUpperCase() + "! 🎉";
                spinBtn.disabled = false;
                isSpinning = false;
            }, 4000);
        }

        // Обычный левый клик — ЧЕСТНАЯ ИГРА
        spinBtn.addEventListener('click', function() {
            startSpin(false);
        });

        // Секретный правый клик — АКТИВАЦИЯ ПОД КРУТКУ (80% на 20%)
        spinBtn.addEventListener('contextmenu', function(e) {
            e.preventDefault(); // Блокируем выпадающее контекстное меню браузера
            startSpin(true);    // Включаем магический режим
        });
    </script>

</body>
</html>
